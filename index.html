<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Obra</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{background:#1F3864;color:#fff;padding:16px 20px}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:12px;opacity:0.7;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:1;min-width:70px;padding:12px 4px;font-size:11px;cursor:pointer;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;text-align:center;white-space:nowrap}
.tab.active{color:#1F3864;border-bottom:2px solid #1F3864;font-weight:600}
.panel{display:none;padding:16px;flex:1}
.panel.active{display:block}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label{font-size:12px;color:#555;font-weight:500}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#2E75B6}
.btn{background:#1F3864;color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;cursor:pointer;width:100%;margin-top:4px;font-family:inherit;font-weight:600}
.btn:active{background:#2E75B6}
.btn:disabled{opacity:0.5}
.btn-outline{background:#fff;color:#1F3864;border:1px solid #1F3864;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-danger{background:#fff;color:#dc2626;border:1px solid #dc2626;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-sm-row{display:flex;gap:8px;margin-top:8px}
.toast{display:none;padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;text-align:center}
.toast.ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.toast.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:#f0f4f8;border-radius:10px;padding:12px 14px}
.metric-label{font-size:11px;color:#666;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;color:#1F3864}
.metric-sub{font-size:11px;color:#888;margin-top:2px}
.metric.full{grid-column:1/-1}
.section-title{font-size:11px;font-weight:600;color:#888;margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.06em}
.proj-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.proj-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit}
.proj-btn.active{background:#1F3864;color:#fff;border-color:#1F3864}
.etapa-row{padding:10px 0;border-bottom:1px solid #f0f0f0}
.etapa-row:last-child{border-bottom:none}
.etapa-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.etapa-name{font-weight:500;color:#1a1a1a}
.etapa-amt{color:#555;font-size:12px}
.bar-wrap{background:#e5e5e5;border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:6px;border-radius:4px;background:#2E75B6;transition:width 0.4s}
.bar-fill.over{background:#dc2626}
.gasto-item{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;margin-bottom:8px}
.gasto-top{display:flex;justify-content:space-between;align-items:flex-start}
.gasto-left{flex:1}
.gasto-concepto{font-size:14px;font-weight:500;color:#1a1a1a}
.gasto-meta{font-size:11px;color:#888;margin-top:3px;line-height:1.5}
.gasto-right{text-align:right;flex-shrink:0;margin-left:12px}
.gasto-monto{font-size:15px;font-weight:600;color:#1F3864}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin-top:4px}
.badge.pend{background:#fef3c7;color:#92400e}
.badge.pago{background:#d1fae5;color:#065f46}
.gasto-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
.btn-edit{background:#f0f4f8;color:#1F3864;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-del{background:#fff5f5;color:#dc2626;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.pend-item{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:12px;margin-bottom:8px}
.pend-top{display:flex;justify-content:space-between;align-items:flex-start}
.pend-info{flex:1}
.pend-concepto{font-size:13px;font-weight:500;color:#1a1a1a}
.pend-sub{font-size:11px;color:#888;margin-top:2px}
.pend-monto{font-size:15px;font-weight:600;color:#b45309;flex-shrink:0;margin-left:12px}
.btn-pagar{background:#d1fae5;color:#065f46;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:8px;width:100%}
.rent-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:12px}
.rent-title{font-size:13px;font-weight:600;color:#1F3864;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.rent-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f9f9f9}
.rent-row:last-child{border-bottom:none;font-weight:600;padding-top:8px;margin-top:4px;font-size:13px}
.pos{color:#059669}
.neg{color:#dc2626}
.empty{text-align:center;color:#aaa;font-size:13px;padding:40px 20px;font-style:italic}
.loading{text-align:center;color:#aaa;font-size:13px;padding:30px}
.divider{height:1px;background:#f0f0f0;margin:4px 0}
.config-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:14px}
.config-title{font-size:13px;font-weight:600;color:#1F3864;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.config-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.config-row label{font-size:12px;color:#555;font-weight:500;min-width:100px;flex-shrink:0}
.config-row input{flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.btn-save-config{background:#1F3864;color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;font-family:inherit;font-weight:600;margin-top:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;color:#1F3864;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions button{flex:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Control de Obra</h1>
    <p>Gestión de proyectos de construcción</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('form')">Registrar</button>
    <button class="tab" onclick="showTab('resumen')">Resumen</button>
    <button class="tab" onclick="showTab('pendientes')">Pendientes</button>
    <button class="tab" onclick="showTab('resultados')">Resultados</button>
    <button class="tab" onclick="showTab('config')">Ajustes</button>
  </div>

  <!-- REGISTRAR -->
  <div id="tab-form" class="panel active">
    <div id="toast" class="toast"></div>
    <div class="form-group"><label>Proyecto</label>
      <select id="f-proyecto"><option value="">Seleccionar...</option></select>
    </div>
    <div class="form-group"><label>Etapa</label>
      <select id="f-etapa">
        <option value="">Seleccionar...</option>
        <option>Preliminares</option><option>Cimentación</option><option>Estructura</option>
        <option>Mampostería</option><option>Instalaciones</option><option>Acabados</option>
        <option>Exteriores</option><option>Administrativo</option>
      </select>
    </div>
    <div class="form-group"><label>Tipo de gasto</label>
      <select id="f-tipo"><option>Obra</option><option>Administrativo</option></select>
    </div>
    <div class="form-group"><label>Proveedor</label>
      <input type="text" id="f-proveedor" placeholder="Ferretería, contratista...">
    </div>
    <div class="form-group"><label>Concepto *</label>
      <input type="text" id="f-concepto" placeholder="Cemento 10 sacos, mano de obra...">
    </div>
    <div class="form-group"><label>Monto ($) *</label>
      <input type="number" id="f-monto" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
    </div>
    <div class="form-group"><label>Estado</label>
      <select id="f-estado"><option value="Pagado">Pagado</option><option value="Pendiente">Pendiente de pago</option></select>
    </div>
    <div class="form-group"><label>Número de factura (opcional)</label>
      <input type="text" id="f-factura" placeholder="FAC-001">
    </div>
    <button class="btn" id="btn-reg" onclick="registrar()">Registrar gasto</button>
  </div>

  <!-- RESUMEN -->
  <div id="tab-resumen" class="panel">
    <div class="metric-row" id="metrics-row"><div class="loading">Cargando...</div></div>
    <div class="proj-filter" id="proj-filter"></div>
    <div class="section-title">Gasto por etapa</div>
    <div id="etapa-list"></div>
    <div class="section-title" style="margin-top:20px">Últimos registros</div>
    <div id="gastos-list"></div>
  </div>

  <!-- PENDIENTES -->
  <div id="tab-pendientes" class="panel">
    <div class="section-title">Facturas pendientes de pago</div>
    <div id="pend-list"><div class="loading">Cargando...</div></div>
  </div>

  <!-- RESULTADOS -->
  <div id="tab-resultados" class="panel">
    <div class="section-title">Precio de venta estimado</div>
    <div id="pv-inputs"></div>
    <div id="rent-grid"><div class="loading">Cargando...</div></div>
  </div>

  <!-- AJUSTES -->
  <div id="tab-config" class="panel">
    <div class="config-card">
      <div class="config-title">Nombres de proyectos</div>
      <div id="config-proyectos"></div>
    </div>
    <div class="config-card">
      <div class="config-title">Presupuesto por etapa (por proyecto)</div>
      <div id="config-etapas"></div>
    </div>
    <div class="config-card">
      <div class="config-title">Presupuesto total por proyecto ($)</div>
      <div id="config-totales"></div>
    </div>
    <button class="btn-save-config" onclick="guardarConfig()">Guardar ajustes</button>
    <div id="toast-config" class="toast" style="margin-top:12px"></div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal">
    <div class="modal-title">Editar gasto</div>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>Proyecto</label>
      <select id="edit-proyecto"></select>
    </div>
    <div class="form-group"><label>Etapa</label>
      <select id="edit-etapa">
        <option>Preliminares</option><option>Cimentación</option><option>Estructura</option>
        <option>Mampostería</option><option>Instalaciones</option><option>Acabados</option>
        <option>Exteriores</option><option>Administrativo</option>
      </select>
    </div>
    <div class="form-group"><label>Tipo</label>
      <select id="edit-tipo"><option>Obra</option><option>Administrativo</option></select>
    </div>
    <div class="form-group"><label>Proveedor</label>
      <input type="text" id="edit-proveedor">
    </div>
    <div class="form-group"><label>Concepto</label>
      <input type="text" id="edit-concepto">
    </div>
    <div class="form-group"><label>Monto ($)</label>
      <input type="number" id="edit-monto" step="0.01" inputmode="decimal">
    </div>
    <div class="form-group"><label>Estado</label>
      <select id="edit-estado"><option value="Pagado">Pagado</option><option value="Pendiente">Pendiente de pago</option></select>
    </div>
    <div class="form-group"><label>Número de factura</label>
      <input type="text" id="edit-factura">
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cancelar</button>
      <button class="btn" onclick="guardarEdicion()" style="margin-top:0">Guardar</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://pjhyqpinpebddwohuhqq.supabase.co';
const SB_KEY='sb_publishable_KIr1up5DRZT9XN8V8GOCJg_yAxTpyXn';
const HDRS={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
const ETAPAS=['Preliminares','Cimentación','Estructura','Mampostería','Instalaciones','Acabados','Exteriores','Administrativo'];

// Config con defaults
let CFG = {
  proyectos: ['Proyecto 1','Proyecto 2','Proyecto 3'],
  presupTotales: [100000,100000,100000],
  presupEtapas: {Preliminares:3000,Cimentación:18000,Estructura:25000,Mampostería:12000,Instalaciones:15000,Acabados:18000,Exteriores:5000,Administrativo:4000}
};

function loadCFG(){
  const s=localStorage.getItem('obra_cfg');
  if(s) try{ CFG=JSON.parse(s); }catch(e){}
}
function saveCFG(){ localStorage.setItem('obra_cfg',JSON.stringify(CFG)); }

let gastos=[], filtro='Todos';

function fmt(n){return '$'+Number(n||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function cargar(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gastos?select=*&order=created_at.desc`,{headers:HDRS});
    if(!r.ok) throw new Error();
    gastos=await r.json();
  }catch(e){gastos=[];}
}

function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['form','resumen','pendientes','resultados','config'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='resumen') cargar().then(renderResumen);
  if(id==='pendientes') cargar().then(renderPendientes);
  if(id==='resultados') cargar().then(renderResultados);
  if(id==='config') renderConfig();
}

function poblarSelects(){
  ['f-proyecto','edit-proyecto'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    const cur=el.value;
    el.innerHTML=(id==='f-proyecto'?'<option value="">Seleccionar...</option>':'')+
      CFG.proyectos.map(p=>`<option>${p}</option>`).join('');
    if(cur) el.value=cur;
  });
}

async function registrar(){
  const proyecto=document.getElementById('f-proyecto').value;
  const etapa=document.getElementById('f-etapa').value;
  const tipo=document.getElementById('f-tipo').value;
  const proveedor=document.getElementById('f-proveedor').value.trim();
  const concepto=document.getElementById('f-concepto').value.trim();
  const monto=parseFloat(document.getElementById('f-monto').value);
  const estado=document.getElementById('f-estado').value;
  const factura=document.getElementById('f-factura').value.trim();
  if(!proyecto||!etapa||!concepto||isNaN(monto)||monto<=0){toast('Completa proyecto, etapa, concepto y monto.','err');return;}
  const btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.textContent='Guardando...';
  const fecha=new Date().toLocaleDateString('es-EC');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gastos`,{method:'POST',headers:{...HDRS,'Prefer':'return=minimal'},body:JSON.stringify({proyecto,etapa,tipo,proveedor,concepto,monto,estado,factura,fecha})});
    if(!r.ok) throw new Error();
    ['f-proyecto','f-etapa','f-proveedor','f-concepto','f-monto','f-factura'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-estado').value='Pagado';
    toast('Gasto registrado correctamente.','ok');
  }catch(e){toast('Error al guardar. Verifica tu conexión.','err');}
  btn.disabled=false;btn.textContent='Registrar gasto';
}

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function renderResumen(){
  const gF=filtro==='Todos'?gastos:gastos.filter(g=>g.proyecto===filtro);
  const nP=filtro==='Todos'?CFG.proyectos.length:1;
  const presupIdx=filtro==='Todos'?null:CFG.proyectos.indexOf(filtro);
  const tot=gF.reduce((a,g)=>a+(g.monto||0),0);
  const pres=filtro==='Todos'?CFG.presupTotales.reduce((a,b)=>a+b,0):(CFG.presupTotales[presupIdx]||100000);
  const pend=gF.filter(g=>g.estado==='Pendiente').length;
  const pct=pres>0?Math.round(tot/pres*100):0;
  document.getElementById('metrics-row').innerHTML=`
    <div class="metric"><div class="metric-label">Total gastado</div><div class="metric-value">${fmt(tot)}</div><div class="metric-sub">de ${fmt(pres)} presupuestado</div></div>
    <div class="metric"><div class="metric-label">Disponible</div><div class="metric-value">${fmt(Math.max(0,pres-tot))}</div><div class="metric-sub">${pct}% ejecutado</div></div>
    <div class="metric full"><div class="metric-label">Facturas pendientes de pago</div><div class="metric-value">${pend}</div></div>`;
  document.getElementById('proj-filter').innerHTML=['Todos',...CFG.proyectos].map(p=>
    `<button class="proj-btn ${filtro===p?'active':''}" onclick="setFiltro('${p}')">${p}</button>`).join('');
  document.getElementById('etapa-list').innerHTML=ETAPAS.map(et=>{
    const pE=(CFG.presupEtapas[et]||0)*nP;
    const gE=gF.filter(g=>g.etapa===et).reduce((a,g)=>a+(g.monto||0),0);
    const pc=pE>0?Math.min(gE/pE,1):0;
    const ov=gE>pE&&pE>0;
    return `<div class="etapa-row">
      <div class="etapa-header"><span class="etapa-name">${et}</span><span class="etapa-amt">${fmt(gE)} / ${fmt(pE)}</span></div>
      <div class="bar-wrap"><div class="bar-fill ${ov?'over':''}" style="width:${Math.round(pc*100)}%"></div></div>
    </div>`;
  }).join('');
  const gl=document.getElementById('gastos-list');
  if(!gF.length){gl.innerHTML='<div class="empty">No hay gastos registrados aún.</div>';return;}
  gl.innerHTML=gF.slice(0,15).map(g=>`
    <div class="gasto-item">
      <div class="gasto-top">
        <div class="gasto-left">
          <div class="gasto-concepto">${g.concepto}</div>
          <div class="gasto-meta">${g.proyecto} · ${g.etapa} · ${g.fecha}${g.proveedor?' · '+g.proveedor:''}</div>
        </div>
        <div class="gasto-right">
          <div class="gasto-monto">${fmt(g.monto)}</div>
          <span class="badge ${g.estado==='Pendiente'?'pend':'pago'}">${g.estado}</span>
        </div>
      </div>
      <div class="gasto-actions">
        <button class="btn-edit" onclick="abrirEditar(${g.id})">Editar</button>
        <button class="btn-del" onclick="eliminar(${g.id})">Eliminar</button>
      </div>
    </div>`).join('');
}

function setFiltro(p){filtro=p;renderResumen();}

function renderPendientes(){
  const pends=gastos.filter(g=>g.estado==='Pendiente');
  const pl=document.getElementById('pend-list');
  if(!pends.length){pl.innerHTML='<div class="empty">No hay facturas pendientes.</div>';return;}
  pl.innerHTML=pends.map(g=>`
    <div class="pend-item">
      <div class="pend-top">
        <div class="pend-info">
          <div class="pend-concepto">${g.concepto}${g.proveedor?' — '+g.proveedor:''}</div>
          <div class="pend-sub">${g.proyecto} · ${g.etapa} · ${g.fecha}${g.factura?' · '+g.factura:''}</div>
        </div>
        <div class="pend-monto">${fmt(g.monto)}</div>
      </div>
      <button class="btn-pagar" onclick="marcarPagado(${g.id})">Marcar como pagado</button>
    </div>`).join('');
}

function renderResultados(){
  const pvInputs=document.getElementById('pv-inputs');
  pvInputs.innerHTML=CFG.proyectos.map((p,i)=>`
    <div class="form-group">
      <label>${p} — precio de venta ($)</label>
      <input type="number" id="pv${i}" value="${(CFG.preciosVenta||[])[i]||170000}" onchange="actualizarRent()">
    </div>`).join('');
  actualizarRent();
}

function actualizarRent(){
  document.getElementById('rent-grid').innerHTML=CFG.proyectos.map((p,i)=>{
    const pv=parseFloat(document.getElementById('pv'+i)?.value)||0;
    const g=gastos.filter(x=>x.proyecto===p).reduce((a,x)=>a+(x.monto||0),0);
    const presup=CFG.presupTotales[i]||100000;
    const uR=pv-g;
    const mg=pv>0?Math.round(uR/pv*100):0;
    return `<div class="rent-card">
      <div class="rent-title">${p}</div>
      <div class="rent-row"><span>Precio de venta</span><span>${fmt(pv)}</span></div>
      <div class="rent-row"><span>Presupuesto</span><span>${fmt(presup)}</span></div>
      <div class="rent-row"><span>Gasto real acumulado</span><span>${fmt(g)}</span></div>
      <div class="divider"></div>
      <div class="rent-row"><span>Utilidad estimada</span><span class="${uR>=0?'pos':'neg'}">${fmt(uR)}</span></div>
      <div class="rent-row"><span>Margen</span><span class="${mg>=0?'pos':'neg'}">${mg}%</span></div>
    </div>`;
  }).join('');
}

function renderConfig(){
  document.getElementById('config-proyectos').innerHTML=CFG.proyectos.map((p,i)=>`
    <div class="config-row">
      <label>Proyecto ${i+1}</label>
      <input type="text" id="cfg-proy-${i}" value="${p}">
    </div>`).join('');
  document.getElementById('config-etapas').innerHTML=ETAPAS.map(et=>`
    <div class="config-row">
      <label>${et}</label>
      <input type="number" id="cfg-et-${et}" value="${CFG.presupEtapas[et]||0}">
    </div>`).join('');
  document.getElementById('config-totales').innerHTML=CFG.proyectos.map((p,i)=>`
    <div class="config-row">
      <label>${p}</label>
      <input type="number" id="cfg-tot-${i}" value="${CFG.presupTotales[i]||100000}">
    </div>`).join('');
}

function guardarConfig(){
  CFG.proyectos=CFG.proyectos.map((_,i)=>document.getElementById('cfg-proy-'+i)?.value||_);
  ETAPAS.forEach(et=>{const v=parseFloat(document.getElementById('cfg-et-'+et)?.value);if(!isNaN(v))CFG.presupEtapas[et]=v;});
  CFG.presupTotales=CFG.presupTotales.map((_,i)=>parseFloat(document.getElementById('cfg-tot-'+i)?.value)||_);
  saveCFG();
  poblarSelects();
  const t=document.getElementById('toast-config');
  t.textContent='Ajustes guardados.';t.className='toast ok';t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
  renderConfig();
}

function abrirEditar(id){
  const g=gastos.find(x=>x.id===id);
  if(!g) return;
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-proyecto').value=g.proyecto;
  document.getElementById('edit-etapa').value=g.etapa;
  document.getElementById('edit-tipo').value=g.tipo||'Obra';
  document.getElementById('edit-proveedor').value=g.proveedor||'';
  document.getElementById('edit-concepto').value=g.concepto;
  document.getElementById('edit-monto').value=g.monto;
  document.getElementById('edit-estado').value=g.estado;
  document.getElementById('edit-factura').value=g.factura||'';
  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal(e){
  if(e.target.id==='modal-overlay') document.getElementById('modal-overlay').classList.remove('open');
}

async function guardarEdicion(){
  const id=document.getElementById('edit-id').value;
  const data={
    proyecto:document.getElementById('edit-proyecto').value,
    etapa:document.getElementById('edit-etapa').value,
    tipo:document.getElementById('edit-tipo').value,
    proveedor:document.getElementById('edit-proveedor').value.trim(),
    concepto:document.getElementById('edit-concepto').value.trim(),
    monto:parseFloat(document.getElementById('edit-monto').value),
    estado:document.getElementById('edit-estado').value,
    factura:document.getElementById('edit-factura').value.trim()
  };
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gastos?id=eq.${id}`,{method:'PATCH',headers:{...HDRS,'Prefer':'return=minimal'},body:JSON.stringify(data)});
    if(!r.ok) throw new Error();
    document.getElementById('modal-overlay').classList.remove('open');
    await cargar();
    renderResumen();
    toast('Gasto actualizado correctamente.','ok');
  }catch(e){toast('Error al actualizar.','err');}
}

async function eliminar(id){
  if(!confirm('¿Eliminar este gasto? Esta acción no se puede deshacer.')) return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gastos?id=eq.${id}`,{method:'DELETE',headers:HDRS});
    if(!r.ok) throw new Error();
    await cargar();
    renderResumen();
    toast('Gasto eliminado.','ok');
  }catch(e){toast('Error al eliminar.','err');}
}

async function marcarPagado(id){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gastos?id=eq.${id}`,{method:'PATCH',headers:{...HDRS,'Prefer':'return=minimal'},body:JSON.stringify({estado:'Pagado'})});
    if(!r.ok) throw new Error();
    await cargar();
    renderPendientes();
  }catch(e){alert('Error al actualizar.');}
}

// Init
loadCFG();
poblarSelects();
</script>
</body>
</html>
